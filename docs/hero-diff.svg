<tspan x="18" y="294" xml:space="preserve" fill="#c9d1d9">       &quot;delimiter&quot;: { &quot;open&quot;: &quot;{{&quot;, &quot;close&quot;: &quot;}}&quot; }</tspan>
<tspan x="18" y="314" xml:space="preserve" fill="#c9d1d9">     },</tspan>
<tspan x="18" y="334" xml:space="preserve" fill="#c9d1d9">     {</tspan>
<tspan x="18" y="354" xml:space="preserve" fill="#c9d1d9">       &quot;name&quot;: &quot;welcome-message&quot;,</tspan>
<tspan x="18" y="374" xml:space="preserve" fill="#c9d1d9">       &quot;version&quot;: &quot;v1&quot;,</tspan>
