<tspan x="18" y="414" xml:space="preserve" fill="#c9d1d9">       &quot;delimiter&quot;: { &quot;open&quot;: &quot;{{&quot;, &quot;close&quot;: &quot;}}&quot; }</tspan>
<tspan x="18" y="434" xml:space="preserve" fill="#c9d1d9">     }</tspan>
<tspan x="18" y="454" xml:space="preserve" fill="#c9d1d9">   ]</tspan>
<tspan x="18" y="474" xml:space="preserve" fill="#c9d1d9"> }</tspan>
